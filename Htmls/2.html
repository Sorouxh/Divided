<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Smooth vertical lines</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #fff;
      }
      .line-motion {
        width: 592px;
        height: 227px;
        position: relative;
        overflow: visible;
      }
      canvas {
        position: absolute;
        top: -12px;
        left: 0;
        display: block;
        width: 100%;
        height: calc(100% + 24px);
        cursor: default;
      }
      @media (prefers-reduced-motion: reduce) {
        .line-motion { opacity: .78; }
      }
    </style>
  </head>
  <body>
    <!-- Copy this element and the script below into your site. -->
    <div class="line-motion" aria-hidden="true">
      <canvas></canvas>
    </div>

    <script>
      (() => {
        const holder = document.querySelector('.line-motion');
        const canvas = holder.querySelector('canvas');
        const context = canvas.getContext('2d');
        const reducedMotion = matchMedia('(prefers-reduced-motion: reduce)');
        const lineCount = 29;
        const hoverExtension = 12;
        let width = 0, height = 0, pixelRatio = 1;
        let hoveredLine = -1;
        let activeLine = -1;
        let activeStrength = 0;

        const lines = Array.from({ length: lineCount }, (_, index) => ({
          base: (index + 0.5) / lineCount,
          x: 0,
          targetX: 0,
          emphasis: 0,
          targetEmphasis: 0
        }));

        function resize() {
          const bounds = holder.getBoundingClientRect();
          pixelRatio = Math.min(devicePixelRatio || 1, 2);
          width = Math.round(bounds.width);
          // The canvas is 24 px taller so the active line can grow beyond the
          // 227 px component without shortening the default lines.
          height = Math.round(bounds.height) + hoverExtension * 2;
          canvas.width = width * pixelRatio;
          canvas.height = height * pixelRatio;
          context.setTransform(pixelRatio, 0, 0, pixelRatio, 0, 0);
          for (const line of lines) {
            line.x = line.base * width;
            line.targetX = line.x;
          }
        }

        function mixColor(amount) {
          const mix = (start, end) => Math.round(start + (end - start) * amount);
          // #EFEFEF at rest, blending continuously to the focal #32404F.
          return `rgb(${mix(239, 50)}, ${mix(239, 64)}, ${mix(239, 79)})`;
        }

        function setHoveredLine(clientX) {
          const bounds = canvas.getBoundingClientRect();
          const pointerX = clientX - bounds.left;
          hoveredLine = lines.reduce((nearest, line, index) =>
            Math.abs(line.x - pointerX) < Math.abs(lines[nearest].x - pointerX) ? index : nearest, 0);
        }

        canvas.addEventListener('pointermove', event => setHoveredLine(event.clientX));
        canvas.addEventListener('pointerleave', () => { hoveredLine = -1; });

        function draw() {
          // The magnetic pull is based on each line's original position, keeping
          // the group ordered even when the pointer moves quickly between lines.
          const easing = reducedMotion.matches ? 1 : 0.16;
          if (hoveredLine >= 0) {
            activeLine = activeLine < 0 ? hoveredLine : activeLine + (hoveredLine - activeLine) * easing;
            activeStrength += (1 - activeStrength) * easing;
          } else {
            activeStrength += (0 - activeStrength) * easing;
          }
          const focusX = activeLine < 0 ? 0 : ((activeLine + 0.5) / lineCount) * width;
          const spread = width * 0.16;

          context.clearRect(0, 0, width, height);
          context.lineWidth = 1;

          lines.forEach((line) => {
            const homeX = line.base * width;
            const distance = activeLine < 0 ? Infinity : Math.abs(homeX - focusX);
            const influence = Math.exp(-(distance * distance) / (2 * spread * spread)) * activeStrength;
            // Nearby lines travel toward the focused line, creating a tighter cluster.
            line.targetX = activeLine < 0 ? homeX : homeX + (focusX - homeX) * influence * 0.58;
            line.targetEmphasis = activeLine < 0 ? 0 : influence;
            line.x += (line.targetX - line.x) * easing;
            line.emphasis += (line.targetEmphasis - line.emphasis) * easing;
            context.strokeStyle = mixColor(line.emphasis);
            // At rest this is exactly 227 px tall. The active line expands by
            // up to 12 px at both ends, with a gradual effect on its neighbours.
            const inset = hoverExtension * (1 - line.emphasis);
            context.beginPath();
            context.moveTo(Math.round(line.x) + 0.5, inset);
            context.lineTo(Math.round(line.x) + 0.5, height - inset);
            context.stroke();
          });
          requestAnimationFrame(draw);
        }

        new ResizeObserver(resize).observe(holder);
        resize();
        requestAnimationFrame(draw);
      })();
    </script>
  </body>
</html>
