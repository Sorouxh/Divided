<!doctype html>
<html lang="en">
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Momentum illustration</title>
<style>
  :root { color-scheme:light; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; display:grid; place-items:center; background:#fff; }
  .momentum { width:592px; height:227px; cursor:default; }
  svg { display:block; width:100%; height:100%; overflow:visible; }
</style>
<div class="momentum" aria-hidden="true"><svg viewBox="0 0 592 227"></svg></div>
<script>
(() => {
  const svg = document.querySelector('svg');
  const host = document.querySelector('.momentum');
  const N = 32, REST = (N - 1) / 2, NS = 'http://www.w3.org/2000/svg';
  const bars = Array.from({length:N}, (_, i) => {
    const path = document.createElementNS(NS, 'path');
    svg.append(path);
    return { path, i, h:0, targetH:0, light:0, targetLight:0, opacity:1, targetOpacity:1 };
  });
  let hovered = -1, focus = REST, strength = 0;
  const heightAt = distance => 8 + 70 * Math.exp(-distance / 2.25);
  const blend = (from, to, amount) => `rgb(${from.map((v,i) => Math.round(v + (to[i]-v)*amount)).join(',')})`;
  const baseStroke = [239,239,239], focusStroke = [50,64,79];

  function setHover(event) {
    const box = svg.getBoundingClientRect();
    const x = (event.clientX - box.left) * 592 / box.width;
    hovered = Math.max(0, Math.min(N - 1, Math.round((458 + 57 - x) / 14.2)));
  }
  host.addEventListener('pointermove', setHover);
  host.addEventListener('pointerleave', () => hovered = -1);

  function draw() {
    const ease = matchMedia('(prefers-reduced-motion: reduce)').matches ? 1 : .12;
    if (hovered >= 0) {
      focus += (hovered - focus) * ease;
      strength += (1 - strength) * ease;
    } else {
      focus += (REST - focus) * ease;
      strength += (0 - strength) * ease;
    }
    bars.forEach(bar => {
      const distance = Math.abs(bar.i - focus);
      // A deliberately small lift makes the exact hovered bar feel selected
      // without changing the calm profile of the overall stack.
      bar.targetH = heightAt(distance) + 8 * strength * Math.exp(-distance / .6);
      bar.targetLight = Math.exp(-distance / 3.1) * strength;
      bar.targetOpacity = 1 - (1 - Math.exp(-distance / 15)) * .28 * strength;
      bar.h += (bar.targetH - bar.h) * ease;
      bar.light += (bar.targetLight - bar.light) * ease;
      bar.opacity += (bar.targetOpacity - bar.opacity) * ease;
      const x = 458 - bar.i * 14.2, baseY = 90 + bar.i * 2.5, top = baseY - bar.h;
      bar.path.setAttribute('d', `M${x} ${top}l115.7 57.8v${bar.h}l-115.7-57.8z`);
      bar.path.style.stroke = blend(baseStroke, focusStroke, bar.light);
      bar.path.style.fill = '#FFFFFF';
      bar.path.style.opacity = bar.opacity;
      bar.path.style.strokeWidth = '1';
      bar.path.style.strokeLinejoin = 'round';
    });
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
</html>
